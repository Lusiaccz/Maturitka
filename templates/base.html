<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris 2026 | {% block title %}{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2ff;   /* Neonově modrá */
            --secondary: #7000ff; /* Neonově fialová */
            --accent: #ff00c8;    /* Neonově růžová */
            --bg: #050505;        /* Skoro černá */
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Záře v pozadí */
            background-image: radial-gradient(circle at 50% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 70%);
            background-attachment: fixed;
        }

        /* --- NAVBAR --- */
        nav {
            margin: 40px auto;
            display: flex;
            align-items: center;
            gap: 35px;
            background: rgba(255, 255, 255, 0.05);
            padding: 22px 45px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.05rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        .nav-avatar {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--secondary), #306);
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            margin-right: -10px;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        /* --- HLAVNÍ KONTEJNER --- */
        .container {
            width: 90%;
            max-width: 900px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            margin-bottom: 50px;
        }

        h1, h2, h3 {
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 0;
        }

        /* --- TABULKY --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            table-layout: fixed;
        }

        th {
            text-align: left;
            padding: 15px 10px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            border-bottom: 2px solid #222;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 20px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            vertical-align: middle;
            word-wrap: break-word;
        }

        /* Definice šířek sloupců pro zarovnání */
        .col-rank { width: 50px; }
        .col-player { width: auto; }
        .col-score { width: 100px; }
        .col-level { width: 120px; text-align: center; }
        .col-date { width: 160px; text-align: right; }

        .score {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 0 5px rgba(255, 0, 200, 0.2);
        }

        /* Fialový štítek Levelu */
        .lvl {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            min-width: 80px;
            text-align: center;
            box-shadow: 0 0 10px rgba(112, 0, 255, 0.4);
        }

        .me-row {
            background: rgba(0, 242, 255, 0.05);
        }

        /* --- TLAČÍTKA --- */
        .btn-neon {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 15px var(--secondary);
        }

        .btn-neon:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 25px var(--primary);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">Domů</a>
        <a href="/leaderboard">Top 20</a>

        {% if session.user_id %}
            <a href="/profile"><div class="nav-avatar">{{ session.username[0] | upper }}</div></a>
            <a href="/profile">Profil</a>
            <a href="/logout" style="color: var(--accent);">Logout</a>
        {% else %}
            <a href="/login">Login</a>
            <a href="/register">Registrace</a>
        {% endif %}
    </nav>

    {% block content %}{% endblock %}

</body>
</html>
